<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyManagerPro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:20px;
    }

    h1{
      margin-bottom:20px;
      color:#4f46e5;
    }

    .container{
      display:flex;
      gap:20px;
    }

    .formulario{
      width:350px;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .formulario input,
    .formulario select,
    .formulario textarea{
      width:100%;
      padding:10px;
      margin-top:5px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    .formulario button{
      width:100%;
      padding:12px;
      border:none;
      background:#4f46e5;
      color:white;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
    }

    .lista{
      flex:1;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .card{
      border:1px solid #ddd;
      padding:15px;
      border-radius:8px;
      margin-bottom:15px;
    }

    .card h3{
      color:#4f46e5;
    }

    .acoes{
      margin-top:10px;
      display:flex;
      gap:10px;
    }

    .btn-excluir{
      background:#dc2626;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:5px;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <h1>🔑 KeyManagerPro</h1>

  <div class="container">

    <!-- FORMULÁRIO -->
    <div class="formulario">

      <h2>Novo Registro</h2>

      <input type="text" id="marca" placeholder="Marca/Fabricante">

      <input type="text" id="codigo" placeholder="Código / Referência">

      <select id="tipo">
        <option value="">Selecione o tipo</option>
        <option value="Yale">Yale</option>
        <option value="Tetra">Tetra</option>
        <option value="Pantográfica">Pantográfica</option>
        <option value="Placa">Placa</option>
      </select>

      <input type="number" id="estoque" placeholder="Quantidade em estoque">

      <input type="text" id="localizacao" placeholder="Localização">

      <textarea id="observacoes" placeholder="Observações"></textarea>

      <button onclick="salvarMaterial()">
        Salvar Registro
      </button>

    </div>

    <!-- LISTA -->
    <div class="lista">

      <h2>Materiais Cadastrados</h2>

      <div id="listaMateriais"></div>

    </div>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    // Importações Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      deleteDoc,
      doc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // SUA CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCTObhr0vWz-0U7dELYoLBin--Z_JINPGM",
      authDomain: "keymanagerpro-f22f8.firebaseapp.com",
      projectId: "keymanagerpro-f22f8",
      storageBucket: "keymanagerpro-f22f8.firebasestorage.app",
      messagingSenderId: "1020249530436",
      appId: "1:1020249530436:web:88702962c8d35e86dddc11"
    };

    // Inicializa Firebase
    const app = initializeApp(firebaseConfig);

    // Banco Firestore
    const db = getFirestore(app);

    // REFERÊNCIA DA COLEÇÃO
    const materiaisRef = collection(db, "materiais");

    // SALVAR MATERIAL
    window.salvarMaterial = async function(){

      const marca = document.getElementById("marca").value;
      const codigo = document.getElementById("codigo").value;
      const tipo = document.getElementById("tipo").value;
      const estoque = document.getElementById("estoque").value;
      const localizacao = document.getElementById("localizacao").value;
      const observacoes = document.getElementById("observacoes").value;

      // Validação simples
      if(!marca || !codigo || !tipo){

        alert("Preencha os campos obrigatórios");

        return;
      }

      try{

        await addDoc(materiaisRef, {

          marca: marca,
          codigo: codigo,
          tipo: tipo,
          estoque: Number(estoque),
          localizacao: localizacao,
          observacoes: observacoes,
          criadoEm: serverTimestamp()

        });

        alert("Material salvo com sucesso!");

        limparFormulario();

      }catch(error){

        console.error(error);

        alert("Erro ao salvar material");

      }

    }

    // LIMPAR FORMULÁRIO
    function limparFormulario(){

      document.getElementById("marca").value = "";
      document.getElementById("codigo").value = "";
      document.getElementById("tipo").value = "";
      document.getElementById("estoque").value = "";
      document.getElementById("localizacao").value = "";
      document.getElementById("observacoes").value = "";

    }

    // LISTAR EM TEMPO REAL
    onSnapshot(materiaisRef, (snapshot) => {

      const lista = document.getElementById("listaMateriais");

      lista.innerHTML = "";

      snapshot.forEach((docItem) => {

        const item = docItem.data();

        lista.innerHTML += `

          <div class="card">

            <h3>${item.codigo}</h3>

            <p><strong>Marca:</strong> ${item.marca}</p>

            <p><strong>Tipo:</strong> ${item.tipo}</p>

            <p><strong>Estoque:</strong> ${item.estoque}</p>

            <p><strong>Localização:</strong> ${item.localizacao}</p>

            <p><strong>Obs:</strong> ${item.observacoes}</p>

            <div class="acoes">

              <button class="btn-excluir"
                onclick="excluirMaterial('${docItem.id}')">

                Excluir

              </button>

            </div>

          </div>

        `;

      });

    });

    // EXCLUIR MATERIAL
    window.excluirMaterial = async function(id){

      const confirmar = confirm("Deseja excluir este item?");

      if(!confirmar) return;

      try{

        await deleteDoc(doc(db, "materiais", id));

        alert("Item excluído!");

      }catch(error){

        console.error(error);

        alert("Erro ao excluir");

      }

    }

  </script>

</body>
</html>
