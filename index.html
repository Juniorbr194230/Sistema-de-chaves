<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Modelos de Chaves</title>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* cinza claro do tailwind gray-100 */
        }
        
        /* Estilo para um scrollbar customizado na tabela */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Animação para mensagens (toast) */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-out forwards;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variáveis de ambiente injetadas
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-chaves-app-id';
        let firebaseConfig;
        
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        } catch(e) {
            console.error("Erro ao fazer parse do firebase config", e);
            firebaseConfig = null;
        }

        // Variáveis globais do app
        let db, auth;
        let currentUser = null;
        let unsubscribeKeys = null;
        let isEditing = false;
        let editId = null;
        let allKeys = []; // Cache local para busca

        // Se não houver configuração do Firebase injetada (rodando local sem env), 
        // vamos usar um mock in-memory para não quebrar a UI
        const isMockMode = !firebaseConfig;

        async function initApp() {
            showLoading("Inicializando sistema...");
            
            if (isMockMode) {
                console.warn("Rodando em modo MOCK. Os dados não serão salvos no Firestore.");
                setupMockData();
                hideLoading();
                renderKeysList();
                setupEventListeners();
                return;
            }

            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                
                if (customToken) {
                    await signInWithCustomToken(auth, customToken);
                } else {
                    await signInAnonymously(auth);
                }
                
                currentUser = auth.currentUser;
                console.log("Usuário autenticado:", currentUser.uid);
                
                setupEventListeners();
                loadKeys();
                hideLoading();
            } catch (error) {
                console.error("Erro na inicialização do Firebase:", error);
                showToast("Erro ao conectar com o banco de dados.", "error");
                hideLoading();
            }
        }

        function loadKeys() {
            if (!currentUser) return;

            // REGRA: Usando o caminho de dados públicos para que, se for compartilhado, outros vejam o mesmo estoque
            // Se quisesse privado: collection(db, 'artifacts', appId, 'users', currentUser.uid, 'keys')
            const keysCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'keys');
            
            showLoading("Carregando inventário...");
            
            unsubscribeKeys = onSnapshot(keysCollectionRef, (snapshot) => {
                allKeys = [];
                snapshot.forEach((doc) => {
                    allKeys.push({ id: doc.id, ...doc.data() });
                });
                
                // Ordenar por data de criação decrescente (mais novos primeiro) no frontend
                allKeys.sort((a, b) => b.createdAt - a.createdAt);
                
                renderKeysList();
                hideLoading();
            }, (error) => {
                console.error("Erro ao observar chaves:", error);
                showToast("Erro ao carregar dados.", "error");
                hideLoading();
            });
        }

        async function saveKey(keyData) {
            if (!currentUser) return;

            showLoading("Salvando...");
            try {
                const keysCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'keys');
                
                if (isEditing && editId) {
                    const docRef = doc(keysCollectionRef, editId);
                    await updateDoc(docRef, {
                        ...keyData,
                        updatedAt: Date.now()
                    });
                    showToast("Modelo atualizado com sucesso!", "success");
                    resetForm();
                } else {
                    await addDoc(keysCollectionRef, {
                        ...keyData,
                        createdAt: Date.now(),
                        createdBy: currentUser.uid
                    });
                    showToast("Modelo cadastrado com sucesso!", "success");
                    resetForm();
                }
            } catch (error) {
                console.error("Erro ao salvar chave:", error);
                showToast("Erro ao salvar dados.", "error");
            } finally {
                hideLoading();
            }
        }

        async function deleteKey(id) {
            if (!currentUser) return;
            
            // Usando modal customizado no lugar de confirm()
            showConfirmModal("Tem certeza que deseja excluir este modelo?", async () => {
                showLoading("Excluindo...");
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'keys', id);
                    await deleteDoc(docRef);
                    showToast("Modelo excluído com sucesso!", "success");
                    
                    if (isEditing && editId === id) {
                        resetForm();
                    }
                } catch (error) {
                    console.error("Erro ao excluir chave:", error);
                    showToast("Erro ao excluir dados.", "error");
                } finally {
                    hideLoading();
                }
            });
        }

        function setupMockData() {
            allKeys = [
                { id: "1", model: "Yale Clássica 4 Pinos", type: "Residencial", brand: "Yale", stock: 150, notes: "Chave comum para portas de madeira.", createdAt: Date.now() },
                { id: "2", model: "Pantográfica Gol G5", type: "Automotiva", brand: "VW/Genérica", stock: 25, notes: "Lâmina virgem, requer máquina específica.", createdAt: Date.now() - 1000 },
                { id: "3", model: "Tetra Chave 30mm", type: "Segurança", brand: "Stam", stock: 80, notes: "Usada em fechaduras auxiliares.", createdAt: Date.now() - 2000 }
            ];
            
            // Sobrescrevendo funções do Firebase para o modo mock
            window.saveKeyMock = function(keyData) {
                if (isEditing && editId) {
                    const index = allKeys.findIndex(k => k.id === editId);
                    if (index !== -1) {
                        allKeys[index] = { ...allKeys[index], ...keyData, updatedAt: Date.now() };
                        showToast("Modelo atualizado com sucesso (Mock)!", "success");
                    }
                } else {
                    allKeys.unshift({ 
                        id: Math.random().toString(36).substr(2, 9), 
                        ...keyData, 
                        createdAt: Date.now() 
                    });
                    showToast("Modelo cadastrado com sucesso (Mock)!", "success");
                }
                resetForm();
                renderKeysList();
            };

            window.deleteKeyMock = function(id) {
                showConfirmModal("Tem certeza que deseja excluir este modelo?", () => {
                    allKeys = allKeys.filter(k => k.id !== id);
                    showToast("Modelo excluído com sucesso (Mock)!", "success");
                    if (isEditing && editId === id) resetForm();
                    renderKeysList();
                });
            };
        }

        function renderKeysList(searchTerm = "") {
            const tbody = document.getElementById('keysTableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            
            let filteredKeys = allKeys;
            
            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                filteredKeys = allKeys.filter(key => 
                    key.model.toLowerCase().includes(term) ||
                    key.type.toLowerCase().includes(term) ||
                    key.brand.toLowerCase().includes(term)
                );
            }

            if (filteredKeys.length === 0) {
                tbody.style.display = 'none';
                emptyState.style.display = 'flex';
                
                if (allKeys.length > 0) {
                    emptyState.innerHTML = `<p class="text-gray-500"><i class="fa-solid fa-search fa-2x mb-3 opacity-50 block text-center"></i>Nenhum modelo encontrado para "${searchTerm}".</p>`;
                } else {
                    emptyState.innerHTML = `<p class="text-gray-500"><i class="fa-solid fa-key fa-2x mb-3 opacity-50 block text-center"></i>Nenhum modelo cadastrado ainda.</p>`;
                }
                return;
            }

            tbody.style.display = '';
            emptyState.style.display = 'none';

            filteredKeys.forEach(key => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 border-b border-gray-100 transition-colors";
                
                // Definir cor da badge baseada no tipo
                let badgeColor = "bg-gray-100 text-gray-800";
                if (key.type === "Residencial") badgeColor = "bg-blue-100 text-blue-800";
                else if (key.type === "Automotiva") badgeColor = "bg-red-100 text-red-800";
                else if (key.type === "Cofre") badgeColor = "bg-purple-100 text-purple-800";
                else if (key.type === "Segurança") badgeColor = "bg-orange-100 text-orange-800";

                // Formatar estoque (vermelho se estiver baixo)
                const stockVal = parseInt(key.stock) || 0;
                const stockColor = stockVal <= 10 ? "text-red-600 font-bold" : "text-gray-700";

                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${escapeHTML(key.model)}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-sm">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${badgeColor}">
                            ${escapeHTML(key.type)}
                        </span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500">${escapeHTML(key.brand)}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-sm ${stockColor}">${stockVal} un.</td>
                    <td class="px-4 py-3 text-sm text-gray-500 max-w-xs truncate" title="${escapeHTML(key.notes)}">${escapeHTML(key.notes || '-')}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editKey('${key.id}')" class="text-indigo-600 hover:text-indigo-900 mr-3 transition-colors" title="Editar">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="handleDelete('${key.id}')" class="text-red-600 hover:text-red-900 transition-colors" title="Excluir">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.editKey = function(id) {
            const keyToEdit = allKeys.find(k => k.id === id);
            if (!keyToEdit) return;

            isEditing = true;
            editId = id;

            // Preencher formulário
            document.getElementById('modelName').value = keyToEdit.model;
            document.getElementById('keyType').value = keyToEdit.type;
            document.getElementById('brand').value = keyToEdit.brand;
            document.getElementById('stock').value = keyToEdit.stock;
            document.getElementById('notes').value = keyToEdit.notes || '';

            // Mudar UI do botão
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = '<i class="fa-solid fa-save mr-2"></i>Atualizar Modelo';
            btnSubmit.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            btnSubmit.classList.add('bg-green-600', 'hover:bg-green-700');
            
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            
            // Rolar para o formulário no mobile
            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
            
            // Focar no primeiro campo
            document.getElementById('modelName').focus();
        };

        window.handleDelete = function(id) {
            if (isMockMode) {
                deleteKeyMock(id);
            } else {
                deleteKey(id);
            }
        }

        function resetForm() {
            document.getElementById('keyForm').reset();
            isEditing = false;
            editId = null;
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = '<i class="fa-solid fa-plus mr-2"></i>Cadastrar Modelo';
            btnSubmit.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            btnSubmit.classList.remove('bg-green-600', 'hover:bg-green-700');
            
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        function setupEventListeners() {
            // Submit do formulário
            document.getElementById('keyForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const keyData = {
                    model: document.getElementById('modelName').value.trim(),
                    type: document.getElementById('keyType').value,
                    brand: document.getElementById('brand').value.trim(),
                    stock: parseInt(document.getElementById('stock').value) || 0,
                    notes: document.getElementById('notes').value.trim()
                };

                if (!keyData.model || !keyData.type) {
                    showToast("Por favor, preencha os campos obrigatórios.", "error");
                    return;
                }

                if (isMockMode) {
                    saveKeyMock(keyData);
                } else {
                    saveKey(keyData);
                }
            });

            // Botão cancelar edição
            document.getElementById('btnCancelEdit').addEventListener('click', resetForm);

            // Busca
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                renderKeysList(e.target.value);
            });
            
            // Limpar busca
            document.getElementById('btnClearSearch').addEventListener('click', () => {
                searchInput.value = '';
                renderKeysList();
                searchInput.focus();
            });
        }

        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let bgColor, icon;
            switch(type) {
                case 'success':
                    bgColor = 'bg-green-500';
                    icon = 'fa-check-circle';
                    break;
                case 'error':
                    bgColor = 'bg-red-500';
                    icon = 'fa-exclamation-circle';
                    break;
                default:
                    bgColor = 'bg-blue-500';
                    icon = 'fa-info-circle';
            }

            toast.className = `flex items-center p-4 mb-4 text-white rounded-lg shadow-lg ${bgColor} toast-enter max-w-sm ml-auto`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} mr-3 text-xl"></i>
                <div class="text-sm font-medium">${escapeHTML(message)}</div>
            `;
            
            toastContainer.appendChild(toast);

            // Remover após 3 segundos
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => {
                    if (toastContainer.contains(toast)) {
                        toastContainer.removeChild(toast);
                    }
                }, 300); // tempo da animação de saída
            }, 3000);
        }

        function showLoading(msg = "") {
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderMsg').textContent = msg;
            loader.classList.remove('hidden');
            loader.classList.add('flex');
        }

        function hideLoading() {
            const loader = document.getElementById('globalLoader');
            loader.classList.add('hidden');
            loader.classList.remove('flex');
        }

        function showConfirmModal(message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmMessage').textContent = message;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const btnYes = document.getElementById('btnConfirmYes');
            const btnNo = document.getElementById('btnConfirmNo');

            // Limpar listeners antigos clonando o botão
            const newBtnYes = btnYes.cloneNode(true);
            const newBtnNo = btnNo.cloneNode(true);
            btnYes.parentNode.replaceChild(newBtnYes, btnYes);
            btnNo.parentNode.replaceChild(newBtnNo, btnNo);

            newBtnYes.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                onConfirm();
            });

            newBtnNo.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Iniciar quando o DOM carregar
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-2 rounded-lg text-indigo-700">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">KeyManager</h1>
            </div>
            <div class="text-indigo-200 text-sm hidden sm:block">
                Sistema de Controle de Modelos
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col md:flex-row gap-6">
        
        <!-- Form Section (Left Side on Desktop) -->
        <section id="formSection" class="w-full md:w-1/3 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 border-b pb-2 flex items-center">
                    <i class="fa-solid fa-list-check mr-2 text-indigo-500"></i>
                    Dados do Modelo
                </h2>
                
                <form id="keyForm" class="space-y-4">
                    <div>
                        <label for="modelName" class="block text-sm font-medium text-gray-700 mb-1">Nome do Modelo <span class="text-red-500">*</span></label>
                        <input type="text" id="modelName" required placeholder="Ex: Yale Clássica 4 Pinos" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>

                    <div>
                        <label for="keyType" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Chave <span class="text-red-500">*</span></label>
                        <select id="keyType" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-white">
                            <option value="" disabled selected>Selecione um tipo</option>
                            <option value="Residencial">Residencial (Yale, Gorje, etc)</option>
                            <option value="Automotiva">Automotiva (Pantográfica, Simples)</option>
                            <option value="Segurança">Segurança (Tetra, Multiponto)</option>
                            <option value="Cofre">Cofre</option>
                            <option value="Tubular">Tubular</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="brand" class="block text-sm font-medium text-gray-700 mb-1">Fabricante/Marca</label>
                            <input type="text" id="brand" placeholder="Ex: Gold, Stam" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                        </div>
                        <div>
                            <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Estoque Inicial</label>
                            <input type="number" id="stock" min="0" value="0" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Observações / Compatibilidade</label>
                        <textarea id="notes" rows="3" placeholder="Ex: Serve também na fechadura X. Lâmina virgem."
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors resize-none"></textarea>
                    </div>

                    <div class="pt-2 flex flex-col gap-2">
                        <button type="submit" id="btnSubmit" 
                            class="w-full bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm flex items-center justify-center">
                            <i class="fa-solid fa-plus mr-2"></i> Cadastrar Modelo
                        </button>
                        <button type="button" id="btnCancelEdit" 
                            class="hidden w-full bg-white border border-gray-300 text-gray-700 font-medium py-2.5 px-4 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors shadow-sm text-center">
                            Cancelar Edição
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- List Section (Right Side on Desktop) -->
        <section class="w-full md:w-2/3 flex flex-col h-full">
            
            <!-- Toolbar de Busca -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="relative w-full sm:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-search text-gray-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="Buscar por modelo, tipo ou fabricante..." 
                        class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    <button id="btnClearSearch" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="text-sm text-gray-500 whitespace-nowrap">
                    Gerencie seu inventário de chaves
                </div>
            </div>

            <!-- Tabela -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-grow flex flex-col overflow-hidden">
                <div class="table-container overflow-x-auto flex-grow">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Modelo</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fabricante</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estoque</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Obs</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="keysTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Os dados serão injetados aqui via JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Estado Vazio -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-center h-64">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </div>
        </section>

    </main>

    <!-- Container de Toasts -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Global Loader Overlay -->
    <div id="globalLoader" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white p-6 rounded-xl shadow-2xl flex flex-col items-center">
            <i class="fa-solid fa-circle-notch fa-spin text-indigo-600 text-4xl mb-4"></i>
            <span id="loaderMsg" class="text-gray-700 font-medium">Carregando...</span>
        </div>
    </div>

    <!-- Modal de Confirmação customizado -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[90] items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 transform transition-all">
            <div class="flex items-center text-red-600 mb-4">
                <i class="fa-solid fa-triangle-exclamation text-2xl mr-3"></i>
                <h3 class="text-lg font-bold text-gray-900">Atenção</h3>
            </div>
            <p id="confirmMessage" class="text-gray-600 mb-6">Tem certeza que deseja continuar?</p>
            <div class="flex justify-end gap-3">
                <button id="btnConfirmNo" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 transition-colors">
                    Cancelar
                </button>
                <button id="btnConfirmYes" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors">
                    Sim, Excluir
                </button>
            </div>
        </div>
    </div>

</body>
</html>
